<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personalize your Notion AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="card">

  <!-- Top -->
  <div class="section-top">
    <p class="card-title">Personalize your Notion AI</p>

    <div class="avatar-row">
      <button class="chevron-btn" id="btn-prev" aria-label="Previous">
        <svg width="6" height="12" viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 1L1 7L7 13" stroke="#00000080" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="avatar-wrapper" id="avatar-wrapper">
        <div class="avatar-container">
          <img src="public/avatar/avatar.png" alt="avatar" />
        </div>
        <!-- sticker injected here by script.js, absolute on top of avatar-container -->
      </div>

      <button class="chevron-btn" id="btn-next" aria-label="Next">
        <svg width="6" height="12" viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1L7 7L1 13" stroke="#00000080" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <input class="name" type="text" placeholder="Enter your name" style="display:none" />
  </div>

  <!-- Bottom -->
  <div class="section-bottom">
<div class="deco-container">
      <div class="deco-grid" id="deco-grid">
        <!-- 16 items injected by script.js -->
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-reset" id="btn-reset">Reset</button>
      <button class="btn btn-done"  id="btn-done">Done</button>
    </div>
  </div>

</div>

<aside class="tooltip" id="tooltip" role="alert" aria-live="polite">
  <p class="tooltip-title">Hey you :)</p>
  <p class="tooltip-text">That's just a prototype! You're not actually copying anything.</p>
</aside>

<script src="script.js"></script>
</body>
</html>
